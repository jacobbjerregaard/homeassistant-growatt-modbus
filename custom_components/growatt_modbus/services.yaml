set_time_slot:
  name: Set battery time slot
  description: >-
    Configure one of the 9 battery charge/discharge time slots on a Growatt
    storage/hybrid inverter.
  fields:
    device_id:
      name: Device
      description: The Growatt device to configure.
      required: true
      selector:
        device:
          integration: growatt_modbus
    slot:
      name: Slot
      description: Time slot number (1-9).
      required: true
      selector:
        number:
          min: 1
          max: 9
          mode: box
    start_time:
      name: Start time
      required: true
      selector:
        time:
    end_time:
      name: End time
      required: true
      selector:
        time:
    priority:
      name: Priority
      description: Operating mode active during the slot.
      required: true
      selector:
        select:
          options:
            - load
            - battery
            - grid
    enabled:
      name: Enabled
      description: Whether the slot is active.
      required: true
      selector:
        boolean:
