# Integration Quality Scale assessment for growatt_modbus.
# Declared tier in manifest.json: platinum (every rule is done or exempt).
rules:
  # --- Bronze ---------------------------------------------------------------
  action-setup: done
  appropriate-polling: done
  brands: done
  common-modules:
    status: done
    comment: >-
      The DataUpdateCoordinator and runtime data live in coordinator.py. Each
      platform defines its own entity base (there is no single shared base
      entity class), so no entity.py module is used.
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # --- Silver ---------------------------------------------------------------
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: >-
      Local Modbus over serial/TCP has no credentials to re-authenticate; the
      reconfigure flow handles changed connection parameters instead.
  test-coverage:
    status: done
    comment: >-
      Combined pure-logic + Home Assistant test coverage is ~95% (see
      scripts/coverage.sh). The remaining gaps are mostly the EMHASS optimizer
      internals and rarely-hit transport error branches.

  # --- Gold (complete) ------------------------------------------------------
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Serial/TCP Modbus devices expose no network discovery protocol.
  discovery-update-info:
    status: exempt
    comment: No discovery, so there is nothing to update.
  docs-supported-devices: done
  docs-supported-functions: done
  docs-known-limitations: done
  docs-use-cases: done
  entity-category: done
  entity-device-class: done
  reconfiguration-flow: done
  docs-data-update: done
  docs-examples: done
  docs-troubleshooting: done
  dynamic-devices:
    status: exempt
    comment: >-
      The device set (inverter plus any battery modules) is enumerated once at
      setup from the Modbus device. There is no runtime mechanism by which new
      physical devices appear; a hardware change is picked up on reload.
  entity-disabled-by-default:
    status: done
    comment: >-
      The firmware-version sensors (inverter Firmware/Control/BDC/BMS and the
      per-module DSP/MCU firmware) are disabled by default; live telemetry and
      headline metrics stay enabled.
  entity-translations:
    status: done
    comment: >-
      Entities set a translation_key (slugified register name, or a generic key
      with a {slot}/{module} placeholder for the indexed time-of-use and
      per-module entities); names live under the entity section of strings.json.
  exception-translations:
    status: done
    comment: >-
      User-facing exceptions raise with translation_domain/translation_key
      (cannot_connect, connection_interrupted, no_response, optimization_failed),
      defined under the exceptions section of strings.json.
  icon-translations:
    status: done
    comment: >-
      The few custom entity icons are defined in icons.json keyed by
      translation_key rather than via the icon=/_attr_icon properties.
  repair-issues:
    status: exempt
    comment: >-
      Failure modes are transient connection errors surfaced via
      ConfigEntryNotReady/UpdateFailed with automatic retry; there is no
      persistent, user-actionable misconfiguration that warrants a repair issue.
  stale-devices:
    status: exempt
    comment: >-
      Same as dynamic-devices: the device set is fixed per config entry. A
      removed battery module is cleared by reloading or reconfiguring the entry.

  # --- Platinum -------------------------------------------------------------
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: done
    comment: >-
      The package ships a py.typed marker and the whole integration is
      mypy-clean, enforced in CI (see pyproject.toml [tool.mypy] and lint.yml).
