# Tooling configuration for the Growatt Modbus integration.
# Lint (ruff) and type-check (mypy) settings live here so both CI and local
# runs share one source of truth.

[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
# Conservative starting rule set: pyflakes (F) plus the import/statement/syntax
# subset of pycodestyle (E4/E7/E9). Can be widened later (e.g. "I" import
# sorting, "UP" pyupgrade, "B" bugbear) once the codebase is clean against them.
select = ["E4", "E7", "E9", "F"]

[tool.mypy]
python_version = "3.13"
# homeassistant / pymodbus / voluptuous don't ship type stubs in this env.
ignore_missing_imports = true
warn_redundant_casts = true
warn_unused_ignores = true
# The whole integration is mypy-clean and checked in CI.
files = ["custom_components/growatt_modbus"]
