name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Pure-logic unit tests
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Run unit tests
        # tests/integration is auto-skipped when HA isn't installed.
        run: pytest

  integration:
    name: Home Assistant integration tests
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: pip install -r requirements_test_ha.txt
      - name: Run integration tests
        run: pytest tests/integration
