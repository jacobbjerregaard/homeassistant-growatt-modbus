name: Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Pure-logic unit tests
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Run unit tests
        # tests/integration is auto-skipped when HA isn't installed.
        run: pytest

  integration:
    name: Home Assistant integration tests
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: pip install -r requirements_test_ha.txt
      - name: Run integration tests
        run: pytest tests/integration
