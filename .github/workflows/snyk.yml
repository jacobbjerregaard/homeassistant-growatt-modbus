name: Snyk Security

# Dependency vulnerability scanning with Snyk. Findings are uploaded as SARIF
# to GitHub code scanning (Security > Code scanning).
#
# Requires a repository secret named SNYK_TOKEN (from https://app.snyk.io
# account settings). When the secret is absent the scan steps are skipped so
# the workflow stays green on forks / before the token is configured.

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    name: Snyk dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip notice
        if: env.SNYK_TOKEN == ''
        run: echo "SNYK_TOKEN secret not set - skipping Snyk scan. Add it under Settings > Secrets to enable."

      - name: Run Snyk to check for vulnerabilities
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/python@master
        continue-on-error: true # don't fail the build on findings; report them instead
        with:
          # Scan the declared dependencies (pymodbus + test tooling).
          args: --file=requirements_test_ha.txt --sarif-file-output=snyk.sarif

      - name: Upload result to GitHub Code Scanning
        if: env.SNYK_TOKEN != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
