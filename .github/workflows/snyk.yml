name: Snyk Security

# Dependency vulnerability scanning with Snyk. Findings are uploaded as SARIF
# to GitHub code scanning (Security > Code scanning).
#
# Requires a repository secret named SNYK_TOKEN (from https://app.snyk.io
# account settings). When the secret is absent the scan steps are skipped so
# the workflow stays green on forks / before the token is configured.

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    name: Snyk dependency scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Skip notice
        if: env.SNYK_TOKEN == ''
        run: echo "SNYK_TOKEN secret not set - skipping Snyk scan. Add it under Settings > Secrets to enable."

      - name: Run Snyk to check for vulnerabilities
        if: env.SNYK_TOKEN != ''
        continue-on-error: true # report findings, don't fail the build
        run: |
          npm install -g snyk
          # Scan the test/runtime requirements explicitly as pip so the
          # tooling-only pyproject.toml isn't mistaken for a Poetry project.
          # `|| true` keeps known findings from failing the step.
          snyk test \
            --package-manager=pip \
            --file=requirements_test_ha.txt \
            --sarif-file-output=snyk.sarif || true

      - name: Upload result to GitHub Code Scanning
        # Only upload when a SARIF file was actually produced.
        if: env.SNYK_TOKEN != '' && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
