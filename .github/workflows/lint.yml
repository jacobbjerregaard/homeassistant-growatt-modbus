name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install -r requirements_lint.txt
      - name: Run ruff
        run: ruff check --output-format=github .

  mypy:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v7"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.14"
      - name: Install dependencies
        # HA + pymodbus are needed so mypy can resolve the imported types.
        run: pip install -r requirements_test_ha.txt -r requirements_lint.txt
      - name: Run mypy
        # Targets are the typed-module allowlist in pyproject.toml.
        run: mypy
