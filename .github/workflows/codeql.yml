name: CodeQL

# GitHub's native static analysis. Results show up under the repo's
# Security > Code scanning tab and annotate pull requests.

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly re-scan so newly published CodeQL queries catch old code too.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      # Required for github/codeql-action to upload results.
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
